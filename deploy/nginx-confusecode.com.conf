# ConfuseCode — nginx site.
#
# This VPS already runs nginx, serving basantarana.com. We ADD a site; we do not
# touch the existing one. nginx routes by `server_name`, so the two coexist.
#
# Install:
#   sudo cp deploy/nginx-confusecode.com.conf /etc/nginx/sites-available/confusecode.com
#   sudo ln -s /etc/nginx/sites-available/confusecode.com /etc/nginx/sites-enabled/
#   sudo nginx -t                 # MUST pass before reloading
#   sudo systemctl reload nginx
#
# Then get HTTPS (certbot rewrites this file to add the TLS bits):
#   sudo certbot --nginx -d confusecode.com -d www.confusecode.com

server {
    listen 80;
    listen [::]:80;
    server_name confusecode.com www.confusecode.com;

    # Mirrors the backend's own 2 MB bodyLimit — reject oversized submissions at
    # the edge so they never reach Node.
    client_max_body_size 2m;

    # Don't advertise the nginx version.
    server_tokens off;

    # ---- Security headers ---------------------------------------------------
    # The authoritative set. The headers in next.config.mjs are a dev convenience;
    # in production the proxy is the boundary.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # HSTS is added by certbot once TLS is on. Don't add it while still on :80 —
    # you'd be telling browsers "always use HTTPS" before HTTPS exists.

    # ---- The API ------------------------------------------------------------
    # /api/* goes STRAIGHT to Fastify, not through Next.js. One fewer hop, and it
    # keeps the browser on a single origin — which is what makes the session
    # cookie work. A cross-origin API would need SameSite=None, which is exactly
    # the CSRF exposure the auth layer was designed to avoid.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # X-Forwarded-Proto is load-bearing: it's how the backend knows the
        # ORIGINAL request was HTTPS even though this hop is plain HTTP.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # An analysis can legitimately take a few seconds (the worker has an
        # 8s wall-clock timeout). Don't let nginx cut it off before the app does.
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ---- Everything else: the Next.js app -----------------------------------
    # Port 3001 — 3000 belongs to basantarana.com on this host.
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade — Next uses it in dev; harmless and correct in prod.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Access log for this site only. nginx never logs request bodies, so the
    # user's source code is never written to disk (§7.9).
    access_log /var/log/nginx/confusecode.access.log;
    error_log  /var/log/nginx/confusecode.error.log;
}
